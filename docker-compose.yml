
version: '3.8'

services:
  app:
    build: .
    container_name: procesos_app
    volumes:
      - ./src:/var/www/html
      - vendor:/var/www/html/vendor
      - node_modules:/var/www/html/node_modules
    working_dir: /var/www/html
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - COMPOSER_ALLOW_SUPERUSER=1

  db:
    build:
      context: ./docker/postgres
    # previously used image: postgres:latest
    container_name: procesos_db
    environment:
      TZ: "America/Argentina/Buenos_Aires"
      POSTGRES_PASSWORD: "root"
      POSTGRES_DB: "laravel"
      POSTGRES_USER: "laravel"
    ports:
      - "5432:5432"
    volumes:
      - ./docker/database:/var/lib/postgresql

  minio:
    image: minio/minio:latest
    container_name: procesos_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    container_name: procesos_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set myminio http://minio:9000 minioadmin minioadmin123 &&
        mc mb --ignore-existing myminio/procesos &&
        mc anonymous set download myminio/procesos &&
        echo 'Bucket procesos listo.' &&
        exit 0
      "
    restart: "no"

# using bind-mount for postgres data to ./docker/database to persist DB files
volumes:
  vendor:
  node_modules:
  minio_data:
